spring.application.name=searchandfiltered_service
server.port=${SEARCH_SERVICE_PORT:8085}

spring.datasource.url=${SEARCH_SERVICE_DB_URL:jdbc:postgresql://localhost:5437/search_service}
spring.datasource.username=${SEARCH_SERVICE_DB_USERNAME:postgres}
spring.datasource.password=${SEARCH_SERVICE_DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.issuer=${AUTH_JWT_ISSUER:auth_service}
app.security.jwt.secret=${AUTH_JWT_SECRET:change-this-secret-key-change-this-secret-key-change-this-secret-key}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SEARCH_KAFKA_GROUP_ID:search-indexer-v1}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

app.search.kafka.enabled=${SEARCH_KAFKA_ENABLED:true}
app.search.kafka.topics=${SEARCH_KAFKA_TOPICS:user.events,directory.events,task.events,project.events,auth.events}
