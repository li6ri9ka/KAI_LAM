spring.application.name=dashboards_service
server.port=${DASHBOARDS_SERVICE_PORT:8086}

spring.datasource.url=${DASHBOARDS_SERVICE_DB_URL:jdbc:postgresql://localhost:5438/dashboards_service}
spring.datasource.username=${DASHBOARDS_SERVICE_DB_USERNAME:postgres}
spring.datasource.password=${DASHBOARDS_SERVICE_DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.issuer=${AUTH_JWT_ISSUER:auth_service}
app.security.jwt.secret=${AUTH_JWT_SECRET:change-this-secret-key-change-this-secret-key-change-this-secret-key}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${DASHBOARD_KAFKA_GROUP_ID:dashboards-v1}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

app.dashboard.kafka.enabled=${DASHBOARD_KAFKA_ENABLED:true}
app.dashboard.kafka.topics=${DASHBOARD_KAFKA_TOPICS:task.events}
