spring.application.name=auth_service
spring.datasource.url=jdbc:postgresql://localhost:5433/auth_user
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.issuer=auth_service
app.security.jwt.access-token-minutes=30
app.security.jwt.refresh-token-days=7
app.security.jwt.secret=change-this-secret-key-change-this-secret-key-change-this-secret-key
app.security.cookie.refresh-name=refresh_token
app.security.cookie.refresh-secure=false
app.security.internal.api-key=change-me-internal-api-key

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.enabled=${APP_KAFKA_ENABLED:true}
app.kafka.topics.auth-events=${APP_KAFKA_TOPIC_AUTH_EVENTS:auth.events}
