spring.datasource.url=jdbc:h2:mem:auth_service;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.flyway.enabled=false

app.security.jwt.issuer=auth_service_test
app.security.jwt.access-token-minutes=30
app.security.jwt.refresh-token-days=7
app.security.jwt.secret=test-secret-key-test-secret-key-test-secret-key-test-secret
app.security.cookie.refresh-name=refresh_token
app.security.cookie.refresh-secure=false
app.security.internal.api-key=test-internal-key

app.kafka.enabled=false
